# Assertion template catalog.
# RULE-REG-7: price, premium, underwriting, and order-state assertions
# must match a configured business template instead of free-form generation.
version: "1.1"

templates:
  price_premium:
    name: "price and premium assertion"
    description: "Validate displayed premium and payable amount against plan, age, period, and discount rules."
    required: true
    match:
      route_keywords:
        - product
        - premium
        - quote
        - plan
        - price
      assertion_keywords:
        - premium
        - price
        - amount
        - payable
        - fee
        - 保费
        - 价格
        - 金额
      condition_keys:
        - productCode
        - planCode
        - ageBand
        - period
      condition_values:
        - BASIC
        - PREMIUM
        - standard
        - classic
    variables:
      required:
        - productCode
        - planCode
      optional:
        - ageBand
        - period
        - paymentFrequency
        - discountCode
    pattern: |
      assert actual_premium is not None
      assert actual_premium >= 0
      assert actual_premium == expected_premium(productCode, planCode, ageBand, period)
    validation_rules:
      - amount_present
      - non_negative
      - equals_expected_premium
      - within_product_rate_table

  underwriting_result:
    name: "underwriting result assertion"
    description: "Validate underwriting outcome and payment eligibility for standard, extra-premium, exclusion, and rejection branches."
    required: true
    match:
      route_keywords:
        - underwriting
        - health
        - auth
        - result
      assertion_keywords:
        - underwriting
        - approve
        - reject
        - exclusion
        - extra premium
        - canPay
        - 核保
        - 承保
        - 拒保
        - 除外
        - 加费
      condition_keys:
        - healthNoticeResult
        - underwritingResult
        - canPay
      condition_values:
        - standard
        - extra_premium
        - exclusion
        - rejected
    variables:
      required:
        - underwritingResult
      optional:
        - healthNoticeResult
        - canPay
        - taskType
        - reasonCode
    pattern: |
      assert underwriting_result in expected_statuses
      assert can_pay == expected_can_pay(underwriting_result)
    expected_statuses:
      - standard
      - extra_premium
      - exclusion
      - rejected
    validation_rules:
      - status_in_expected_set
      - can_pay_matches_status
      - reason_present_for_non_standard

  order_status:
    name: "order status assertion"
    description: "Validate insurance order and policy lifecycle transitions after submit, underwriting, payment, and issue steps."
    required: true
    match:
      route_keywords:
        - payment
        - order
        - pay
        - policy
        - result
      assertion_keywords:
        - order
        - payment
        - policy
        - issue
        - status
        - 订单
        - 支付
        - 出单
        - 保单
      condition_keys:
        - orderStatus
        - paymentStatus
        - policyNo
        - orderId
      condition_values:
        - applying
        - underwriting
        - pending_payment
        - paid
        - issued
        - rejected
    variables:
      required:
        - orderId
        - orderStatus
      optional:
        - paymentStatus
        - policyNo
        - underwritingResult
    pattern: |
      assert order_status in valid_statuses
      assert order_status in valid_transitions[previous_order_status]
      assert policy_no_present_when_issued(order_status, policyNo)
    valid_statuses:
      - applying
      - underwriting
      - pending_payment
      - paid
      - issued
      - rejected
      - failed
      - cancelled
    valid_transitions:
      applying:
        - underwriting
        - pending_payment
        - failed
      underwriting:
        - pending_payment
        - rejected
        - failed
      pending_payment:
        - paid
        - cancelled
        - failed
      paid:
        - issued
        - failed
      issued:
        - issued
      rejected:
        - rejected
      failed:
        - failed
      cancelled:
        - cancelled
    validation_rules:
      - status_in_expected_set
      - transition_allowed
      - policy_number_required_when_issued
