name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate lock files
        run: |
          python -m pip install uv
          uv lock --check
          npm ci --ignore-scripts
          npx playwright --version
      - name: Validate repository hygiene
        run: python tools/validate_repository.py
      - name: Validate documentation
        run: python tools/validate_docs.py
      - name: Validate dependency ownership
        run: python tools/validate_dependencies.py
      - name: Validate schemas
        run: python tools/validate_schemas.py
      - name: Validate domain packs
        run: python tools/validate_domains.py
      - name: Validate workflows
        run: python tools/validate_workflows.py
      - name: Validate runners and plugins
        run: |
          python tools/validate_runners.py
          python tools/validate_plugins.py
      - name: Check model and domain boundaries
        run: |
          python tools/ci_rule_check.py
          python tools/check_domain_boundaries.py
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short > pytest.log 2>&1
      - name: Run release acceptance matrix
        run: python tools/acceptance_matrix.py > acceptance.json
      - name: Build and install wheel
        run: |
          python -m pip wheel . --no-deps -w dist
          python -m venv --system-site-packages /tmp/e2e-wheel-smoke
          /tmp/e2e-wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/e2e-wheel-smoke/bin/e2e-agent --help
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence
          path: |
            pytest.log
            acceptance.json
          if-no-files-found: warn
