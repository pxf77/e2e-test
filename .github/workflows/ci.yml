name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate lock files
        run: |
          python -m pip install uv
          uv lock --check
          npm ci --ignore-scripts
          npx playwright --version
      - name: Validate repository hygiene
        run: python -m tools.validate.repository
      - name: Validate documentation
        run: python -m tools.validate.docs
      - name: Validate dependency ownership
        run: python -m tools.validate.dependencies
      - name: Validate test layout
        run: python -m tools.validate.tests
      - name: Validate schemas
        run: python -m tools.validate.schemas
      - name: Validate legacy isolation
        run: python -m tools.validate.legacy
      - name: Validate domain packs
        run: python -m tools.validate.domains
      - name: Validate workflows
        run: python -m tools.validate.workflows
      - name: Validate runners and plugins
        run: |
          python -m tools.validate.runners
          python -m tools.validate.plugins
      - name: Check model and domain boundaries
        run: |
          python -m tools.validate.rules
          python -m tools.validate.boundaries
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short > pytest.log 2>&1
      - name: Run release acceptance matrix
        run: python -m tools.acceptance > acceptance.json
      - name: Build and install wheel
        run: |
          python -m pip wheel . --no-deps -w dist
          python -m venv --system-site-packages /tmp/e2e-wheel-smoke
          /tmp/e2e-wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/e2e-wheel-smoke/bin/e2e-agent --help
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence
          path: |
            pytest.log
            acceptance.json
          if-no-files-found: warn
