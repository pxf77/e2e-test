name: legacy-inventory

on:
  pull_request:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Apply legacy source migration
        run: python tools/migrate_legacy_source_once.py
      - name: Commit migration
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src tests tools docs workflows config examples products README.md AGENTS.md CLAUDE.md Makefile pyproject.toml
            git commit -m "refactor(legacy): isolate agents browser graph and skills"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Build post-migration inventory
        run: |
          git ls-files 'src/e2e_agent/legacy/**' > legacy-files.txt
          git grep -n -E 'e2e_agent\.(agents|browser|graph|skills)|src/e2e_agent/(agents|browser|graph|skills)' -- '*.py' '*.md' '*.yaml' '*.yml' '*.json' '*.toml' > stale-references.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: legacy-inventory
          path: |
            legacy-files.txt
            stale-references.txt
