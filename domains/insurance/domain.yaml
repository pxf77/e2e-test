id: insurance
name: Insurance E2E Regression Domain
version: "1.2.0"
description: "保险投保、核保、支付、出单与保单服务链路的 P0 回归领域包。"

extends:
  - generic-web

ontology: ontology.yaml
state_machine: state-machine.yaml
state_deps: state-deps.yaml
assertion_pack: assertion-pack.yaml
data_pack: data-pack.yaml

supported_workflows:
  - p0-insurance-regression
  - p0-web-regression

page_types:
  - product_detail
  - premium_calculation
  - plan_selection
  - applicant_info
  - insured_info
  - beneficiary
  - suitability
  - health_notice
  - insure_form
  - tax_info
  - underwriting
  - risk_control
  - payment
  - policy_result
  - policy_service
  - surrender

business_terms:
  policy: 保单
  premium: 保费
  underwriting: 核保
  health_notice: 健康告知
  policy_result: 出单结果
  surrender: 退保
