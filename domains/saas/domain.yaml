id: saas
name: SaaS Administration E2E Domain
version: "1.0.0"
description: "SaaS 登录、工作区、资源管理、权限与审计链路领域包。"

extends:
  - generic-web

ontology: ontology.yaml
state_deps: state-deps.yaml
assertion_pack: assertion-pack.yaml
data_pack: data-pack.yaml

supported_workflows:
  - p0-web-regression
  - smoke-static-web

page_types:
  - login
  - workspace
  - resource_list
  - resource_editor
  - permission
  - audit_log
  - result

business_terms:
  workspace: 工作区
  resource: 资源
  permission: 权限
  audit_log: 审计日志
