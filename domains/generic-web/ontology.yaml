version: "1.1.0"

page_types:
  landing:
    name: "Landing"
    description: "入口页或营销落地页。"
    node_type: form
    url_pattern: "/"
    keywords: [home, landing, index, welcome, 首页, 入口]
  listing:
    name: "Listing"
    description: "列表页或搜索结果页。"
    node_type: form
    url_pattern: "/list*"
    keywords: [list, search, catalog, products, 列表, 搜索]
  detail:
    name: "Detail"
    description: "详情页。"
    node_type: form
    url_pattern: "/detail*"
    keywords: [detail, product, item, 详情]
  form:
    name: "Form"
    description: "需要用户录入信息的表单页。"
    node_type: form
    url_pattern: "/form*"
    keywords: [form, apply, submit, input, 表单, 填写, 输入]
  review:
    name: "Review"
    description: "提交前确认页。"
    node_type: confirm
    url_pattern: "/review*"
    keywords: [review, confirm, summary, 确认, 核对]
  payment:
    name: "Payment"
    description: "支付或结算页。"
    node_type: payment
    url_pattern: "/payment*"
    keywords: [payment, checkout, pay, 支付, 结算]
  result:
    name: "Result"
    description: "结果页或完成页。"
    node_type: result
    url_pattern: "/result*"
    keywords: [result, success, complete, done, 结果, 成功, 完成]

business_intents:
  navigate:
    keywords: [open, visit, navigate, 进入, 打开]
  input:
    keywords: [input, fill, enter, 填写, 输入]
  submit:
    keywords: [submit, confirm, 提交, 确认]
  verify:
    keywords: [assert, verify, check, 校验, 验证]
  main_flow:
    keywords: [end to end, e2e, 完整流程, 主流程]

flow_chains:
  navigate: [landing]
  input: [landing, form]
  submit: [landing, form, review, result]
  verify: [landing, result]
  main_flow: [landing, detail, form, review, payment, result]

optional_page_types:
  - review
  - payment
