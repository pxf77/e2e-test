id: generic-web
name: Generic Web E2E Domain
version: "1.3.0"
description: "行业无关 Web、API 与多端回归基础领域包，提供页面类型、状态依赖和通用断言。"

ontology: ontology.yaml
state_deps: state-deps.yaml
assertion_pack: assertion-pack.yaml
data_pack: data-pack.yaml

supported_workflows:
  - p0-web-regression
  - smoke-static-web
  - plugin-smoke
  - api-contract-regression
  - mobile-regression

page_types:
  - landing
  - listing
  - detail
  - form
  - review
  - payment
  - result

business_terms:
  page: 页面
  form: 表单
  result: 结果
