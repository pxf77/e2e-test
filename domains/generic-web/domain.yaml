id: generic-web
name: Generic Web E2E Domain
version: "1.1.0"
description: "行业无关 Web UI 回归测试领域包，提供基础页面类型、状态依赖和通用断言。"

ontology: ontology.yaml
state_deps: state-deps.yaml
assertion_pack: assertion-pack.yaml
data_pack: data-pack.yaml

supported_workflows:
  - p0-web-regression
  - smoke-static-web
  - plugin-smoke

page_types:
  - landing
  - listing
  - detail
  - form
  - review
  - payment
  - result

business_terms:
  page: 页面
  form: 表单
  result: 结果
